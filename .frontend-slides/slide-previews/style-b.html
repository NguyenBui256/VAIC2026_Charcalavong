<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VAIC — Style B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#05070c}
.deck-viewport{position:fixed;inset:0;overflow:hidden;background:#05070c}
.deck-stage{position:absolute;left:0;top:0;width:1920px;height:1080px;overflow:hidden;transform-origin:0 0}
.slide{position:absolute;inset:0;width:1920px;height:1080px;overflow:hidden}

/* === STYLE B — Orchestrator Dark-Tech === */
:root{
  --bg:#070b12; --cyan:#2ff0d6; --cyan-dim:#16b8a6; --magenta:#ff4d8d;
  --grid:rgba(120,200,220,.06); --ink:#e6f4f5; --muted:#6f8494;
}
.slide{
  background:
    radial-gradient(1000px 700px at 82% 8%, rgba(47,240,214,.10), transparent 58%),
    radial-gradient(760px 620px at 12% 100%, rgba(255,77,141,.09), transparent 55%),
    linear-gradient(180deg,#080d16 0%,#05070c 100%);
  font-family:'Sora',sans-serif;color:var(--ink);overflow:hidden;
}
/* grid */
.grid{position:absolute;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(1400px 900px at 60% 40%,#000 40%,transparent 85%)}
/* node graph motif */
svg.net{position:absolute;right:70px;top:120px;width:820px;height:820px;opacity:.9}
.node{fill:#0a1420;stroke:var(--cyan-dim);stroke-width:2}
.node.hot{stroke:var(--cyan)}
.edge{stroke:rgba(47,240,214,.35);stroke-width:2;stroke-dasharray:6 8;animation:dash 3s linear infinite}
.pulse{fill:var(--cyan);animation:beat 2.4s ease-in-out infinite}
@keyframes dash{to{stroke-dashoffset:-56}}
@keyframes beat{0%,100%{opacity:.35;r:6}50%{opacity:1;r:9}}

.wrap{position:absolute;left:120px;top:0;bottom:0;width:1180px;display:flex;flex-direction:column;justify-content:center;z-index:3}
.status{display:inline-flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:.12em;color:var(--cyan);border:1px solid rgba(47,240,214,.3);padding:12px 20px;border-radius:8px;width:max-content;background:rgba(47,240,214,.05);margin-bottom:40px;opacity:0;animation:rise .6s .1s forwards}
.status .led{width:10px;height:10px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan);animation:blink 1.6s infinite}
@keyframes blink{50%{opacity:.3}}
h1{font-size:132px;line-height:.94;margin:0;font-weight:700;letter-spacing:-.02em}
h1 span{display:block;opacity:0;animation:rise .8s forwards}
h1 .a{animation-delay:.28s}
h1 .b{color:var(--cyan);animation-delay:.42s}
.sub{font-size:30px;line-height:1.5;color:var(--muted);max-width:1000px;margin-top:38px;opacity:0;animation:rise .8s .62s forwards}
.sub b{color:var(--ink);font-weight:500}
.chips{display:flex;gap:14px;margin-top:52px;font-family:'JetBrains Mono',monospace;opacity:0;animation:rise .8s .8s forwards}
.chip{font-size:19px;padding:11px 18px;border-radius:6px;border:1px solid rgba(120,200,220,.25);color:var(--cyan);letter-spacing:.04em}
.chip.mg{color:var(--magenta);border-color:rgba(255,77,141,.3)}

.brand{position:absolute;left:120px;top:80px;font-family:'JetBrains Mono',monospace;font-size:26px;letter-spacing:.4em;color:var(--muted);z-index:3}
.brand b{color:var(--cyan)}
.footer{position:absolute;left:120px;bottom:78px;font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--muted);letter-spacing:.06em;z-index:3}
.footer b{color:var(--ink)}
@keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}h1 span,.sub,.chips,.status{opacity:1}}
</style>
</head>
<body>
<div class="deck-viewport"><div class="deck-stage" id="stage">
  <section class="slide">
    <div class="grid"></div>
    <svg class="net" viewBox="0 0 820 820">
      <line class="edge" x1="410" y1="150" x2="200" y2="420"/>
      <line class="edge" x1="410" y1="150" x2="620" y2="420"/>
      <line class="edge" x1="410" y1="150" x2="410" y2="410"/>
      <line class="edge" x1="200" y1="420" x2="410" y2="670"/>
      <line class="edge" x1="620" y1="420" x2="410" y2="670"/>
      <line class="edge" x1="410" y1="410" x2="410" y2="670"/>
      <circle class="node hot" cx="410" cy="150" r="42"/>
      <circle class="node" cx="200" cy="420" r="34"/>
      <circle class="node" cx="620" cy="420" r="34"/>
      <circle class="node" cx="410" cy="410" r="30"/>
      <circle class="node hot" cx="410" cy="670" r="38"/>
      <circle class="pulse" cx="410" cy="150" r="6"/>
      <circle class="pulse" cx="200" cy="420" r="6" style="animation-delay:.5s"/>
      <circle class="pulse" cx="620" cy="420" r="6" style="animation-delay:1s"/>
      <circle class="pulse" cx="410" cy="670" r="6" style="animation-delay:1.5s"/>
    </svg>
    <div class="brand">VA<b>I</b>C</div>
    <div class="wrap">
      <div class="status"><span class="led"></span> orchestrator · online</div>
      <h1><span class="a">Multi-Agent</span><span class="b">Banking Automation</span></h1>
      <p class="sub">Planner phân rã yêu cầu phức tạp → các agent chuyên gia phối hợp qua MCP → <b>tự sinh mini-app</b> phát sự kiện ngược lại workflow.</p>
      <div class="chips">
        <span class="chip">Agent Builder</span>
        <span class="chip">Workflow Orchestrator</span>
        <span class="chip mg">Actions · Events</span>
      </div>
    </div>
    <div class="footer">VAIC 2026 &nbsp;·&nbsp; Demo: <b>Thẩm định &amp; Giải ngân Vay Thế Chấp Ô tô</b></div>
  </section>
</div></div>
<script>
function fit(){var s=document.getElementById('stage');var k=Math.min(innerWidth/1920,innerHeight/1080);s.style.transform='translate('+(innerWidth-1920*k)/2+'px,'+(innerHeight-1080*k)/2+'px) scale('+k+')';}
addEventListener('resize',fit);fit();
</script>
</body>
</html>
