# VAIC Alembic config — stub. Story 1.2 runs `alembic init alembic` and ships first migration.
# Do NOT run alembic against this file yet; sqlalchemy.url is a placeholder.

[alembic]
script_location = alembic
prepend_sys_path = .
# Real URL injected via env at migration time. Story 1.2 sets this up.
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
